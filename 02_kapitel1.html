<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Cactus Canyon Kapitel 1</title>
<style>
  body { font-family: Arial, sans-serif; margin: 20px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .cell { border: 1px solid #ccc; padding: 10px; text-align: center; }
  img { max-width: 100%; height: auto; display: block; margin: 0 auto; }
  h1 { grid-column: span 4; text-align: center; }
</style>
</head>
<body>

<h1>Kapitel 1: Cactus Canyon Spielablauf</h1>

<div class="grid">
  <div class="cell"><strong>Original Version</strong><br>Beschreibung der Phase</div>
  <div class="cell"><img src="images/playfield1.png" alt="Playfield Original"></div>
  <div class="cell"><img src="images/playfield2.png" alt="Playfield Remake"></div>
  <div class="cell"><strong>Remake / Lyman Sheats</strong><br>Beschreibung der Phase</div>

  <div class="cell">Phase 2 Original</div>
  <div class="cell"><img src="images/playfield3.png" alt="Playfield Original"></div>
  <div class="cell"><img src="images/playfield4.png" alt="Playfield Remake"></div>
  <div class="cell">Phase 2 Remake</div>
</div>

</body>
</html>
